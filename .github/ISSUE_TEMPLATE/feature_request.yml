name: Feature Request
description: Suggest a new feature or enhancement
title: "[feature] "
labels: [enhancement, needs-triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve? Why does this matter?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you think this should work? Include CLI examples if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches have you considered?

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How would we know this feature is done?

  - type: dropdown
    id: scope
    attributes:
      label: Affected area
      options:
        - Offline evaluator
        - Online evaluator
        - Security scanner
        - Test spec format
        - CLI / UX
        - Reporters (terminal, JUnit, JSON)
        - CI / GitHub Action
        - Documentation
        - Other

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to submit a PR for this feature
